<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Tipos de Ingreso</h1>
    <p class="page-sub">Gestiona los tipos de ingresos disponibles</p>
  </div>
  <app-data-table title="Tipos" [columns]="columns" [data]="items()" [loading]="loading()"
    (addItem)="openAdd()" (editItem)="openEdit($event)" (deleteItem)="delete($event)">
  </app-data-table>
</div>

<app-modal-form title="Tipo" [isEdit]="isEdit()" [visible]="modalVisible()" [form]="form"
  (submitted)="submit()" (cancelled)="modalVisible.set(false)">
  <div class="field">
    <label>Nombre *</label>
    <input type="text" [formControl]="$any(form.get('name'))" placeholder="Nombre del tipo" />
  </div>
  <div class="field">
    <label>Descripción *</label>
    <input type="text" [formControl]="$any(form.get('description'))" placeholder="Descripción del tipo" />
  </div>
</app-modal-form>
