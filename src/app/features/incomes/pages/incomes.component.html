<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Ingresos</h1>
    <p class="page-sub">Registra y gestiona todos tus ingresos</p>
  </div>

  <app-data-table title="Ingresos" [columns]="columns" [data]="items()" [loading]="loading()" (addItem)="openAdd()"
    (editItem)="openEdit($event)" (deleteItem)="delete($event)">
  </app-data-table>
</div>

<app-modal-form title="Ingreso" [isEdit]="isEdit()" [visible]="modalVisible()" [form]="form" (submitted)="submit()"
  (cancelled)="modalVisible.set(false)">

  <div [formGroup]="form">
    <div class="form-row">
      <div class="field">
        <label>Monto *</label>
        <input type="number" formControlName="amount" placeholder="0.00" step="0.01" />
      </div>
      <div class="field">
        <label>Fuente *</label>
        <input type="text" formControlName="source" placeholder="Ej: Salario, Freelance..." />
      </div>
    </div>

    <div class="field" style="margin-top:16px">
      <label>Descripción *</label>
      <textarea rows="2" formControlName="description" placeholder="Descripción breve"></textarea>
    </div>

    <div class="field">
      <label>Fecha</label>
      <app-datepicker formControlName="date"></app-datepicker>
    </div>
  </div>

</app-modal-form>
