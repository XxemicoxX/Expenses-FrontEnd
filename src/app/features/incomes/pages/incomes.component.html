<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Ingresos</h1>
    <p class="page-sub">Registra y gestiona todos tus ingresos</p>
  </div>

  <app-data-table
    title="Ingresos"
    [columns]="columns"
    [data]="items()"
    [loading]="loading()"
    (addItem)="openAdd()"
    (editItem)="openEdit($event)"
    (deleteItem)="delete($event)">
  </app-data-table>
</div>

<app-modal-form
  title="Ingreso"
  [isEdit]="isEdit()"
  [visible]="modalVisible()"
  [form]="form"
  (submitted)="submit()"
  (cancelled)="modalVisible.set(false)">

  <form [formGroup]="form">
    <div class="form-row">
      <div class="field">
        <label>Nombre *</label>
        <input type="text" formControlName="name" placeholder="Nombre del ingreso" />
      </div>
      <div class="field">
        <label>Monto *</label>
        <input type="number" formControlName="amount" placeholder="0.00" step="0.01" />
      </div>
    </div>

    <div class="field">
      <label>Descripción *</label>
      <textarea rows="2" formControlName="description" placeholder="Descripción breve"></textarea>
    </div>

    <div class="field">
      <label>Fuente *</label>
      <input type="text" formControlName="source" placeholder="Ej: Salario, Freelance..." />
    </div>

    <div class="form-row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" formControlName="date" />
      </div>
      <div class="field">
        <label>Hora</label>
        <input type="time" formControlName="hour" />
      </div>
    </div>

    <div class="field">
      <label>Tipo *</label>
      <select formControlName="id_type">
        <option [ngValue]="null">Seleccionar tipo...</option>
        @for (t of types(); track t.id_type) {
          <option [value]="t.id_type">{{ t.name }}</option>
        }
      </select>
    </div>
  </form>

</app-modal-form>
