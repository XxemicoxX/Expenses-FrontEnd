<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Ingresos</h1>
    <p class="page-sub">Registra y gestiona todos tus ingresos</p>
  </div>
  <app-data-table title="Ingresos" [columns]="columns" [data]="items()" [loading]="loading()"
    (addItem)="openAdd()" (editItem)="openEdit($event)" (deleteItem)="delete($event)">
  </app-data-table>
</div>

<app-modal-form title="Ingreso" [isEdit]="isEdit()" [visible]="modalVisible()" [form]="form"
  (submitted)="submit()" (cancelled)="modalVisible.set(false)">

  <div class="form-row">
    <div class="field">
      <label>Nombre *</label>
      <input type="text" [formControl]="$any(form.get('name'))" placeholder="Nombre del ingreso" />
    </div>
    <div class="field">
      <label>Monto *</label>
      <input type="number" [formControl]="$any(form.get('amount'))" placeholder="0.00" step="0.01" />
    </div>
  </div>
  <div class="field">
    <label>Descripción *</label>
    <textarea rows="2" [formControl]="$any(form.get('description'))" placeholder="Descripción breve"></textarea>
  </div>
  <div class="field">
    <label>Fuente *</label>
    <input type="text" [formControl]="$any(form.get('source'))" placeholder="Ej: Salario, Freelance..." />
  </div>
  <div class="form-row">
    <div class="field">
      <label>Fecha</label>
      <input type="date" [formControl]="$any(form.get('date'))" />
    </div>
    <div class="field">
      <label>Hora</label>
      <input type="time" [formControl]="$any(form.get('hour'))" />
    </div>
  </div>
  <div class="field">
    <label>Tipo *</label>
    <select [formControl]="$any(form.get('id_type'))">
      <option [ngValue]="null">Seleccionar tipo...</option>
      @for (t of types(); track t.id_type) {
        <option [value]="t.id_type">{{ t.name }}</option>
      }
    </select>
  </div>

</app-modal-form>
