<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Gastos</h1>
    <p class="page-sub">Gestión de todos los gastos registrados</p>
  </div>

  <app-data-table
    title="Gastos"
    [columns]="columns"
    [data]="spents()"
    [loading]="loading()"
    (addItem)="openAdd()"
    (editItem)="openEdit($event)"
    (deleteItem)="delete($event)">
  </app-data-table>
</div>

<app-modal-form
  title="Gasto"
  [isEdit]="isEdit()"
  [visible]="modalVisible()"
  [form]="form"
  (submitted)="submit()"
  (cancelled)="modalVisible.set(false)">

  <form [formGroup]="form">
    <div class="form-row">
      <div class="field">
        <label>Nombre *</label>
        <input type="text" formControlName="name" placeholder="Nombre del gasto" />
      </div>
      <div class="field">
        <label>Monto *</label>
        <input type="number" formControlName="amount" placeholder="0.00" step="0.01" />
      </div>
    </div>

    <div class="field">
      <label>Descripción *</label>
      <textarea formControlName="description" rows="2" placeholder="Descripción breve"></textarea>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" formControlName="date" />
      </div>
      <div class="field">
        <label>Hora</label>
        <input type="time" formControlName="hour" />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label>Método de Pago *</label>
        <select formControlName="id_payment_method">
          <option [ngValue]="null">Seleccionar...</option>
          @for (p of payments(); track p.id_payment) {
            <option [value]="p.id_payment">{{ p.name }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label>Categoría *</label>
        <select formControlName="id_categorie">
          <option [ngValue]="null">Seleccionar...</option>
          @for (c of categories(); track c.id_categorie) {
            <option [value]="c.id_categorie">{{ c.name }}</option>
          }
        </select>
      </div>
    </div>
  </form>

</app-modal-form>
