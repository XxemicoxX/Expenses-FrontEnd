<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Gastos</h1>
    <p class="page-sub">Gestión de todos los gastos registrados</p>
  </div>

  <app-data-table title="Gastos" [columns]="columns" [data]="spents()" [loading]="loading()" (addItem)="openAdd()"
    (editItem)="openEdit($event)" (deleteItem)="delete($event)">
  </app-data-table>
</div>

<app-modal-form title="Gasto" [isEdit]="isEdit()" [visible]="modalVisible()" [form]="form" (submitted)="submit()"
  (cancelled)="modalVisible.set(false)">

  <div class="form-row">
    <div class="field">
      <label>Nombre *</label>
      <input type="text" [formControl]="$any(form.get('name'))" placeholder="Nombre del gasto" />
    </div>
    <div class="field">
      <label>Monto *</label>
      <input type="number" [formControl]="$any(form.get('amount'))" placeholder="0.00" step="0.01" />
    </div>
  </div>

  <div class="field">
    <label>Descripción *</label>
    <textarea [formControl]="$any(form.get('description'))" rows="2" placeholder="Descripción breve"></textarea>
  </div>

  <div class="form-row">
    <div class="field">
      <label>Fecha</label>
      <app-datepicker [formControl]="$any(form.get('date'))"></app-datepicker>
    </div>
    <div class="field">
      <label>Hora</label>
      <input type="time" [formControl]="$any(form.get('hour'))" />
    </div>
  </div>

  <div class="form-row">
    <div class="field">
      <label>Método de Pago *</label>
      <select [formControl]="$any(form.get('idPayment'))">
        <option [ngValue]="null">Seleccionar...</option>
        @for (p of payments(); track p.idPayment) {
        <option [value]="p.idPayment">{{ p.name }}</option>
        }
      </select>
    </div>
    <div class="field">
      <label>Categoría *</label>
      <select [formControl]="$any(form.get('idCategorie'))">
        <option [ngValue]="null">Seleccionar...</option>
        @for (c of categories(); track c.idCategorie) {
        <option [value]="c.idCategorie">{{ c.name }}</option>
        }
      </select>
    </div>
  </div>

</app-modal-form>
