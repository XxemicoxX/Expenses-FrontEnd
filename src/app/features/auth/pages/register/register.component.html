<div class="auth-shell">
  <div class="auth-left">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">FinTrack</span>
    </div>
    <div class="auth-hero">
      <h1>Comienza a controlar tus finanzas hoy</h1>
      <p>Crea tu cuenta gratis y empieza a registrar tus gastos e ingresos.</p>
    </div>
    <div class="auth-stats">
      <div class="stat"><span class="stat-value">✓</span><span class="stat-label">Gratis</span></div>
      <div class="stat"><span class="stat-value">✓</span><span class="stat-label">Seguro</span></div>
      <div class="stat"><span class="stat-value">✓</span><span class="stat-label">Fácil</span></div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <button class="theme-btn" (click)="theme.toggle()">
          {{ theme.isDark() ? '☀' : '☾' }}
        </button>
      </div>

      <h2 class="auth-title">Crear cuenta</h2>
      <p class="auth-sub">Completa los datos para registrarte</p>

      @if (error()) {
        <div class="alert-error">{{ error() }}</div>
      }

      <div [formGroup]="form" class="auth-form">
        <div class="field">
          <label>Nombre completo</label>
          <input type="text" formControlName="name" placeholder="Tu nombre" autocomplete="name" />
        </div>

        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email" />
        </div>

        <div class="field">
          <label>Contraseña <span class="hint">(mínimo 6 caracteres)</span></label>
          <div class="input-eye">
            <input [type]="showPassword() ? 'text' : 'password'"
                   formControlName="password"
                   placeholder="••••••••"
                   autocomplete="new-password" />
            <button type="button" class="eye-btn" (click)="showPassword.update(v => !v)">
              {{ showPassword() ? '🙈' : '👁' }}
            </button>
          </div>
        </div>

        <button class="btn-primary" (click)="submit()" [disabled]="loading()">
          @if (loading()) {
            <span class="btn-spinner"></span> Registrando...
          } @else {
            Crear cuenta
          }
        </button>
      </div>

      <p class="auth-switch">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
